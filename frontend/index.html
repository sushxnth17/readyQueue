<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ReadyQueue</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="main-container">
		<header>
			<h1>ReadyQueue</h1>
			<p>Where processes compete for CPU time</p>
		</header>

		<main>
			<section aria-labelledby="process-input-heading">
				<h2 id="process-input-heading">Process Input</h2>

				<div>
					<label for="processCount">Number of Processes:</label>
					<input
						id="processCount"
						type="number"
						name="processCount"
						value="3"
						min="1"
						step="1"
						aria-label="Number of Processes"
					>
					<button id="generateTableBtn" type="button">Generate Table</button>
				</div>

				<table id="processTable">
					<thead>
						<tr>
							<th scope="col">Process ID</th>
							<th scope="col">Arrival Time</th>
							<th scope="col">Burst Time</th>
							<th scope="col" class="priorityColumnHeader">Priority</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td><input type="text" name="processId[]" aria-label="Process ID"></td>
							<td><input type="number" name="arrivalTime[]" aria-label="Arrival Time" placeholder="e.g. 0"></td>
							<td><input type="number" name="burstTime[]" aria-label="Burst Time" placeholder="e.g. 5"></td>
							<td class="priorityColumnCell"><input type="number" name="priority[]" aria-label="Priority" placeholder="e.g. 1"></td>
						</tr>
					</tbody>
				</table>

				<div>
					<button id="addProcessBtn" type="button">Add Process</button>

					<label for="algorithm">Algorithm:</label>
					<select id="algorithm" name="algorithm">
						<option value="FCFS">FCFS</option>
						<option value="SJF">SJF</option>
						<option value="SRTF">SRTF</option>
						<option value="Round Robin">Round Robin</option>
						<option value="Preemptive Priority">Preemptive Priority</option>
					</select>

					<div id="timeQuantumGroup">
						<label for="timeQuantum">Time Quantum:</label>
						<input
							id="timeQuantum"
							type="number"
							name="timeQuantum"
							value="2"
							min="1"
							step="1"
							aria-label="Time Quantum"
						>
					</div>

					<button id="runBtn" type="button">Run Simulation</button>
				</div>
			</section>

			<section aria-labelledby="gantt-heading" id="ganttSection" style="display: none;">
				<h2 id="gantt-heading">Execution Timeline</h2>
				<div id="ganttChart"></div>
			</section>
		</main>
	</div>
	<script src="script.js"></script>
</body>
</html>
